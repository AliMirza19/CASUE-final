<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Affairs Dashboard - Cause Society CUST</title>
    <!-- Tailwind CSS CDN --><script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display.swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
        }
        .btn-primary { 
            background-color: #5d3a8e; 
            border: none; 
            transition: background-color 0.2s ease-in-out;
        }
        .btn-primary:hover { 
            background-color: #4a2f72; 
        }
        .scroll-area { max-height: calc(100vh - 120px); overflow-y: auto; }
        .event-status { display: inline-block; padding: 4px 10px; border-radius: 9999px; font-size: 0.8rem; font-weight: 600; }
        .status-pending { background-color: #fcd34d; color: #92400e; } /* Pending SA Review */
        .status-approved { background-color: #10b981; color: #ecfdf5; } /* Final Approved */
        .status-rejected { background-color: #f87171; color: #fef2f2; } /* Rejected */
        .status-review { background-color: #3b82f6; color: #eff6ff; } /* Pending HOD */
        .modal-overlay { background-color: rgba(0, 0, 0, 0.75); }

        /* Custom scrollbar */
        .scroll-area::-webkit-scrollbar { width: 8px; }
        .scroll-area::-webkit-scrollbar-track { background: #e0e0e0; border-radius: 10px; }
        .scroll-area::-webkit-scrollbar-thumb { background-color: #9275B7; border-radius: 10px; border: 2px solid #e0e0e0; }
        .scroll-area::-webkit-scrollbar-thumb:hover { background-color: #5d3a8e; }
        
        /* Form focus styles */
        input:focus, textarea:focus, select:focus {
            border-color: #5d3a8e;
            box-shadow: 0 0 0 2px rgba(93, 58, 142, 0.4);
        }
        
        /* Modal Animation */
        .modal-content {
            transition: all 0.3s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Top Navigation Bar (Themed Purple) -->
    <nav id="app-header" class="bg-[#5d3a8e] p-4 flex items-center justify-between shadow-lg z-10 hidden">
        <div class="flex items-center">
            <img src="https://play-lh.googleusercontent.com/8QQUZDWOC8RpSqVsw2apjdnLiHvyLc1vJBpOC0MNQcE3_-JHv3XtW1K5m6YmVA6I-A" alt="CUST Logo" class="h-10 w-10 mr-3 rounded-full bg-white p-1">
            <span class="text-white text-xl font-extrabold">CAUSE Society</span>
            <span class="text-white text-sm ml-2 hidden md:inline opacity-80">Student Affairs Portal</span>
        </div>
        
        <div class="flex items-center space-x-4">
            <!-- User Info and Profile Button -->
            <span id="header-user-info" class="text-white text-md font-semibold hidden sm:inline"></span>
            <button onclick="renderApp('profile')" class="relative text-white hover:opacity-80 transition duration-150">
                <img id="header-profile-pic" src="https://placehold.co/40x40/cccccc/333333?text=P" alt="Profile" class="h-10 w-10 rounded-full object-cover border-2 border-white shadow-md">
            </button>
            <button onclick="handleLogout()" class="bg-[#9275B7] hover:bg-[#a68bc4] text-white font-semibold py-1 px-3 rounded-lg text-sm transition duration-150">Logout</button>
        </div>
    </nav>

    <div class="flex flex-1">
        
        <!-- Sidebar Navigation (Fixed) -->
        <aside id="app-sidebar" class="w-64 bg-white p-4 shadow-xl sticky top-0 h-screen overflow-y-auto z-0 hidden" style="padding-top: 1rem; border-right: 1px solid #e5e7eb;">
            <nav class="space-y-2" id="sidebar-nav">
                <!-- Sidebar content will be rendered by renderSidebar() -->
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main id="app-container" class="flex-1 p-4 md:p-8 bg-gray-50">
            
            <div id="message-box" class="fixed top-20 right-5 z-50 transition-transform duration-500 transform translate-x-full"></div>

            <div id="main-content">
                <!-- Content will be rendered here by renderApp function -->
                <div class="max-w-xl mx-auto p-6 bg-white shadow-xl rounded-xl">
                    <p class="text-center text-gray-600 mb-6">System is Loading...</p>
                </div>
            </div>
        </main>
    </div>

    
    <!-- Modal for Feedback/Revision -->
    <div id="feedback-modal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-8 modal-content transform transition-all duration-300 scale-95 opacity-0">
            <h3 class="text-2xl font-bold mb-4 text-red-600">Request Revision</h3>
            <p class="mb-4 text-sm text-gray-700">The feedback will be sent back to the HOD.</p>
            <form id="feedback-form" onsubmit="handleFeedbackSubmission(event)">
                <input type="hidden" name="eventId" id="feedback-eventId">
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2" for="feedback-message">Feedback Message</label>
                    <textarea class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#5d3a8e] transition duration-200" id="feedback-message" name="message" rows="4" required placeholder="e.g., The budget is too high for this type of event..."></textarea>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeFeedbackModal()" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-lg">
                        Cancel
                    </button>
                    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg">
                        Send Feedback
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Floating Chat Button (UI Enhancement) -->
    <button id="fab-chat" class="hidden fixed bottom-6 right-6 bg-[#5d3a8e] hover:bg-[#4a2f72] text-white p-4 rounded-full shadow-xl hover:shadow-2xl transition duration-200 ease-in-out transform hover:scale-110 focus:outline-none z-40">
        <svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
    </button>

    
    <script>
        // NO FIREBASE SCRIPT (MOCK DEMO MODE)

        let userId = null;
        let userName = '';
        let userRegId = '';
        let userProfile = {}; 
        let isAuthReady = false;
        let currentView = 'login'; // Start at login
        
        // --- Mock Data States ---
        let saEventRequests = []; // Events pending SA's review
        let societyTeam = [];
        let publicPosts = [];
        let allEventHistory = [];
        
        // --- Term State (Mocked) ---
        let currentTerm = "Summer 2025";

        // --- Utility Functions ---

        function showMessage(message, type = 'success', duration = 4000) {
            const box = document.getElementById('message-box');
            if (!box) return;

            const bgColor = type === 'error' ? 'bg-red-500' : type === 'warning' ? 'bg-yellow-500' : 'bg-green-500';
            const html = `
                <div class="${bgColor} text-white p-4 rounded-xl shadow-2xl mb-3 flex items-center">
                    <span class="flex-grow">${message}</span>
                    <button onclick="this.parentNode.remove()" class="ml-4 font-bold">&times;</button>
                </div>
            `;
            box.insertAdjacentHTML('afterbegin', html);
            box.classList.remove('translate-x-full');
            box.classList.add('translate-x-0');

            setTimeout(() => {
                const elementToRemove = box.lastElementChild;
                if (elementToRemove) elementToRemove.remove();
                if (box.children.length === 0) {
                    box.classList.remove('translate-x-0');
                    box.classList.add('translate-x-full');
                }
            }, duration);
        }
        window.showMessage = showMessage;
        
        function escapeHtmlAttribute(str) {
            if (!str) return '';
            return String(str).replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, '');
        }
        
        // --- UI Helper Functions ---
        function getFriendlyTitle(view) {
            const titles = {
                'overview': 'Student Affairs Dashboard',
                'review-events': 'Review Event Requests',
                'view-history': 'View Event History',
                'view-team': 'View Society Team',
                'profile': 'Profile Settings',
                'login': 'Welcome, Student Affairs',
            };
            return titles[view] || 'Dashboard';
        }

        function getFriendlySubtitle(view) {
            const subtitles = {
                'overview': `Welcome back, ${userName || 'Director'}. Current Term: ${currentTerm}.`,
                'review-events': 'Review and provide final approval for events based on budget and policy.',
                'view-history': `View all pending and approved events for the ${currentTerm} term.`,
                'view-team': 'Browse the current active society members.',
                'profile': 'Update your personal details and change your password.',
                'login': 'Log in to the CAUSE Society Student Affairs Portal.',
            };
            return subtitles[view] || `Welcome, ${userName || 'Director'}.`;
        }

        // --- Sample Data Injection ---
        
        function loadSampleData() {
            currentTerm = "Summer 2025";

            publicPosts = [
                { id: 'p1', title: 'Welcome to Fall Term 2025!', description: '...', author: 'President Adil Saleem', createdAt: new Date().toISOString(), isPublished: true, imageUrl: 'https.placehold.co/400x200/9275B7/ffffff?text=Welcome+Post' },
            ];
            
            // Data for SA's review list
            if (saEventRequests.length === 0) {
                saEventRequests = [
                    { 
                        id: 'req_p1', 
                        title: 'DevDay Conference 2025', 
                        description: 'A full-day conference with 3 external speakers on DevOps and Cloud Native technologies.', 
                        eventDate: '2026-02-10', 
                        requestedBy: 'Zainab Qureshi (SE-2022-005)', 
                        status: 'Pending Student Affairs', 
                        currentVersion: 1, 
                        feedback: [], 
                        resources: { venue: 'Main Auditorium', budget: '150,000', items: '3 Shields, 10 Banners, Lunch for 150' },
                        term: 'Summer 2025'
                    },
                    { 
                        id: 'req_p2', 
                        title: 'Intro to Git/GitHub Workshop', 
                        description: 'A 2-hour workshop for first-year students.', 
                        eventDate: '2026-01-15', 
                        requestedBy: 'Ali Hamza (SE-2021-120)', 
                        status: 'Final Approved', // Already approved by SA
                        currentVersion: 1, 
                        feedback: [], 
                        resources: { venue: 'CS Lab 4', budget: '5,000', items: '2 Banners, 50 Certificates' },
                        term: 'Summer 2025'
                    },
                ];
            }

            // Combine all events for history view
            allEventHistory = [...saEventRequests];

            // Data for Society Team
            if (societyTeam.length === 0) {
                societyTeam = [
                    { id: 't1', name: 'Adil Saleem', role: 'President', regId: 'SE-2020-001' },
                    { id: 't2', name: 'Dr. Usman Ali', role: 'Patron', regId: 'PATRON-001' },
                    { id: 't3', name: 'Dr. Aisha Rahman', role: 'HOD', regId: 'HOD-001' },
                    { id: 't4', name: 'Maria Khan', role: 'Vice President', regId: 'SE-2021-020' },
                    { id: 't5', name: 'Sana Javed', role: 'Volunteer Coordinator', regId: 'SE-2021-045' },
                ];
            }
           
            userProfile = {
                phone: '+92 311 9998888',
                address: 'CUST University Student Affairs Office, Islamabad',
                picUrl: 'https://placehold.co/100x100/7c2d12/ffffff?text=SA',
            };
        }


        // --- Initialization and Mock Auth Setup ---

        function initApp() {
            isAuthReady = true;
            loadSampleData(); 
            renderApp('login'); // Start at login screen
        }
        
        // --- Mock Authentication Handlers ---

        function handleLogin(e) {
            e.preventDefault();
            const regId = e.target.regId.value;
            
            // Log in as mock Student Affairs
            userId = 'mock-sa-001';
            userName = 'Director Student Affairs'; // Mock user name
            userRegId = regId || 'SA-001'; // Use entered ID or default
            
            loadSampleData();
            
            showMessage(`Welcome back, ${userName}!`, 'success');
            renderApp('overview'); // Navigate to dashboard
        }
        window.handleLogin = handleLogin;

        function handleLogout() {
            userId = null;
            userName = '';
            userRegId = '';
            userProfile = {};
            saEventRequests = []; 
            societyTeam = [];
            allEventHistory = [];
            
            showMessage("You have been successfully logged out.");
            renderApp('login');
        }
        window.handleLogout = handleLogout;
        
        async function handlePasswordUpdate(e) {
            e.preventDefault();
            showMessage("Password successfully updated (Demo).", 'success');
            e.target.reset(); 
        }
        window.handlePasswordUpdate = handlePasswordUpdate;

        async function handleProfileUpdate(e) {
            e.preventDefault();
            const form = e.target;
            
            userProfile.phone = form.phone.value;
            userProfile.address = form.address.value;
            userProfile.picUrl = form.picUrl.value;
            
            showMessage("Profile details updated successfully (Demo).", 'success');
            renderApp('profile'); 
        }
        window.handleProfileUpdate = handleProfileUpdate;


        // --- Student Affairs Specific Logic (Mock) ---

        window.openFeedbackModal = function(eventId) {
            document.getElementById('feedback-eventId').value = eventId;
            
            const modal = document.getElementById('feedback-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.querySelector('.modal-content').classList.remove('scale-95', 'opacity-0');
                modal.querySelector('.modal-content').classList.add('scale-100', 'opacity-100');
            }, 10);
        }
        
        window.closeFeedbackModal = function() {
            const modal = document.getElementById('feedback-modal');
            modal.querySelector('.modal-content').classList.remove('scale-100', 'opacity-100');
            modal.querySelector('.modal-content').classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300); 
        }

        window.handleFeedbackSubmission = function(e) {
            e.preventDefault();
            const form = e.target;
            const eventId = form.eventId.value;
            const message = form.message.value;
            
            const eventIndex = saEventRequests.findIndex(r => r.id === eventId);
            if (eventIndex > -1) {
                saEventRequests[eventIndex].status = 'Pending HOD Review';
                saEventRequests[eventIndex].feedback.push({ role: 'Student Affairs', message: message });
                
                showMessage("Feedback sent to HOD for revision (Demo).", 'success');
                renderApp('review-events'); 
            }
            
            closeFeedbackModal();
            form.reset();
        }
        
        window.handleEventApproval = function(eventId) {
            const eventIndex = saEventRequests.findIndex(r => r.id === eventId);
            if (eventIndex > -1) {
                saEventRequests[eventIndex].status = 'Final Approved';
                showMessage("Event has been Final Approved (Demo). Notifications sent.", 'success');
                renderApp('review-events');
            }
        }
        
        // --- Rendering Functions ---

        function renderApp(view = 'overview') {
            const container = document.getElementById('main-content');
            const header = document.getElementById('app-header');
            const sidebar = document.getElementById('app-sidebar');
            const fab = document.getElementById('fab-chat');
            currentView = view;

            if (!isAuthReady) {
                container.innerHTML = `<p class="text-center text-gray-600">Waiting for Authentication...</p>`;
                return;
            }

            if (!userId) {
                // User is logged out
                container.innerHTML = renderLandingPage();
                header.classList.add('hidden');
                sidebar.classList.add('hidden');
                fab.classList.add('hidden');
                document.getElementById('app-container').classList.remove('p-4', 'md:p-8', 'bg-gray-50');
            } else {
                // User is logged in
                header.classList.remove('hidden');
                sidebar.classList.remove('hidden');
                fab.classList.remove('hidden');
                document.getElementById('app-container').classList.add('p-4', 'md:p-8', 'bg-gray-50');
                
                renderSidebar();

                // Update Header
                document.getElementById('header-profile-pic').src = userProfile.picUrl || 'https.placehold.co/40x40/cccccc/333333?text=P';
                document.getElementById('header-user-info').innerText = `${userName} (${userRegId})`;

                let contentHtml = '';
                switch(currentView) {
                    case 'review-events': contentHtml = renderSaEventReview(); break;
                    case 'view-history': contentHtml = renderViewEventHistory(); break;
                    case 'view-team': contentHtml = renderViewSocietyTeam(); break;
                    case 'profile': contentHtml = renderProfileManagement(); break;
                    case 'overview':
                    default: contentHtml = renderOverviewAnnouncements(); break;
                }
                
                container.innerHTML = `
                    <h1 class="text-3xl font-extrabold text-gray-800 mb-2">${getFriendlyTitle(currentView)}</h1>
                    <p class="text-gray-600 mb-8 font-medium">${getFriendlySubtitle(currentView)}</p>
                    <div id="dashboard-content" class="p-0">
                        ${contentHtml}
                    </div>
                `;
            }
        }
        window.renderApp = renderApp;
        
        function renderSidebar() {
            const navContainer = document.getElementById('sidebar-nav');
            
            const navItems = [
                { id: 'overview', label: 'Dashboard', icon: `<svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>` },
                { id: 'review-events', label: 'Review Events', icon: `<svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>` },
                { id: 'view-history', label: 'View Event History', icon: `<svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v11.494m0 0l-5-5m5 5l5-5M3 10h18M3 14h18"></path></svg>` },
                { id: 'view-team', label: 'View Society Team', icon: `<svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-2.37M16 13a4 4 0 100-8 4 4 0 000 8zM7 13a4 4 0 100-8 4 4 0 000 8zM2 20v-2a3 3 0 015.356-2.37M14 13a4 4 0 100-8 4 4 0 000 8z"></path></svg>` },
            ];
            
            let navHtml = `
                <h3 class="text-sm font-bold text-[#5d3a8e] uppercase mb-4 px-2 tracking-wider">SA Menu</h3>
                ${navItems.map(item => {
                    const isActive = currentView === item.id;
                    return `
                        <button onclick="renderApp('${item.id}')" class="flex items-center w-full py-2 px-3 rounded-lg text-gray-700 font-medium hover:bg-gray-100 transition duration-150 group ${isActive ? 'bg-[#e7e0f2] text-[#5d3a8e] font-semibold' : ''}">
                            <div class="h-5 w-5 mr-3 group-hover:text-[#5d3a8e] ${isActive ? 'text-[#5d3a8e]' : 'text-gray-500'}">
                                ${item.icon}
                            </div>
                            ${item.label}
                        </button>
                    `;
                }).join('')}
                
                <div class="pt-4 border-t border-gray-100 mt-4">
                    <h3 class="text-sm font-bold text-gray-400 uppercase mb-2 px-2 tracking-wider">Settings</h3>
                    <button onclick="renderApp('profile')" class="flex items-center w-full py-2 px-3 rounded-lg text-gray-700 font-medium hover:bg-gray-100 transition duration-150 group ${currentView === 'profile' ? 'bg-[#e7e0f2] text-[#5d3a8e] font-semibold' : ''}">
                        <svg class="h-5 w-5 mr-3 group-hover:text-[#5d3a8e] ${currentView === 'profile' ? 'text-[#5d3a8e]' : 'text-gray-500'}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        Profile Settings
                    </button>
                </div>
            `;
            navContainer.innerHTML = navHtml;
        }

        function renderLandingPage() {
            return `
                <div class="max-w-xl mx-auto p-8 bg-white shadow-2xl rounded-2xl border-t-8 border-[#5d3a8e] mt-20">
                    <div class="flex flex-col items-center mb-6">
                        <img src="https://play-lh.googleusercontent.com/8QQUZDWOC8RpSqVsw2apjdnLiHvyLc1vJBpOC0MNQcE3_-JHv3XtW1K5m6YmVA6I-A" alt="CUST Logo" class="h-16 w-16 mb-2">
                        <h2 class="text-3xl font-extrabold text-gray-800 text-center">CAUSE Society Portal</h2>
                        <p class="text-center text-gray-600 mt-2">Student Affairs Login</p>
                    </div>

                    <div class="p-6 border border-gray-200 rounded-xl shadow-inner">
                        <h3 class="text-xl font-semibold text-[#5d3a8e] mb-4 border-b pb-2">Login to Dashboard</h3>
                        <form onsubmit="handleLogin(event)" class="space-y-4">
                            <div>
                                <label class="block text-gray-700 text-sm font-bold mb-2" for="login-regId">Registration ID</label>
                                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-[#9275B7] transition" id="login-regId" type="text" placeholder="SA-001" name="regId" required>
                            </div>
                            <div>
                                <label class="block text-gray-700 text-sm font-bold mb-2" for="login-password">Password</label>
                                <input class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 focus:outline-none focus:ring-2 focus:ring-[#9275B7] transition" id="login-password" type="password" placeholder="password" name="password" required>
                            </div>
                            <button class="w-full btn-primary text-white font-bold py-2 rounded-lg shadow-md transition duration-150" type="submit">
                                Login
                            </button>
                        </form>
                    </div>
                </div>
            `;
        }

        function renderOverviewAnnouncements() {
            const pendingEvents = saEventRequests.filter(r => r.status === 'Pending Student Affairs');
            const approvedEvents = saEventRequests.filter(r => r.status === 'Final Approved');
            
            const postsHtml = publicPosts.length === 0 ? 
                `<p class="text-gray-500">No new announcements are available at the moment.</p>` :
                publicPosts.map(post => `
                    <div class="p-5 border-l-4 border-[#9275B7] bg-white rounded-xl shadow-lg transition-all duration-300 hover:shadow-xl">
                        <h4 class="text-xl font-extrabold text-[#5d3a8e]">${post.title}</h4>
                        <p class="text-xs text-gray-500 mb-3 font-semibold">Posted: ${new Date(post.createdAt).toLocaleDateString()} | By: ${post.author || 'Society Management'}</p>
                        ${post.imageUrl ? `<img src="${post.imageUrl}" onerror="this.onerror=null;this.src='https.placehold.co/400x200/9275B7/ffffff?text=Post+Image';" class="my-3 rounded-lg max-w-full h-auto shadow-sm">` : ''}
                        <p class="text-gray-700 leading-relaxed">${post.description}</p>
                    </div>
                `).join('');

            return `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    
                    <!-- Stat Cards -->
                    <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-yellow-500 transition-all duration-300 hover:shadow-xl">
                        <h3 class="text-xl font-bold text-yellow-600 mb-4 flex items-center">
                            <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Pending Event Reviews
                        </h3>
                        <p class="text-5xl font-extrabold text-gray-800">${pendingEvents.length}</p>
                        <button onclick="renderApp('review-events')" class="mt-4 text-sm font-semibold text-[#5d3a8e] hover:underline">Review now →</button>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-green-600 transition-all duration-300 hover:shadow-xl">
                        <h3 class="text-xl font-bold text-green-700 mb-4 flex items-center">
                            <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                            Total Approved Events
                        </h3>
                        <p class="text-5xl font-extrabold text-gray-800">${approvedEvents.length}</p>
                        <button onclick="renderApp('view-history')" class="mt-4 text-sm font-semibold text-[#5d3a8e] hover:underline">View History →</button>
                    </div>
                    <div class="bg-white p-6 rounded-xl shadow-lg border-t-4 border-blue-500 transition-all duration-300 hover:shadow-xl">
                        <h3 class="text-xl font-bold text-blue-600 mb-4 flex items-center">
                            <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-2.37M16 13a4 4 0 100-8 4 4 0 000 8zM7 13a4 4 0 100-8 4 4 0 000 8zM2 20v-2a3 3 0 015.356-2.37M14 13a4 4 0 100-8 4 4 0 000 8z"></path></svg>
                            Society Team
                        </h3>
                        <p class="text-5xl font-extrabold text-gray-800">${societyTeam.length}</p>
                        <button onclick="renderApp('view-team')" class="mt-4 text-sm font-semibold text-[#5d3a8e] hover:underline">View Team →</button>
                    </div>

                    <!-- Announcements -->
                    <div class="md:col-span-3 mt-6">
                        <h2 class="text-2xl font-bold mb-6 text-gray-800">Live Announcements</h2>
                        <div class="space-y-4">
                            ${postsHtml}
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderSaEventReview() {
            const pendingRequests = saEventRequests.filter(r => r.status === 'Pending Student Affairs');
            
            if (pendingRequests.length === 0) {
                return `
                    <div class="bg-white p-6 rounded-xl shadow-lg border-l-4 border-green-500">
                        <p class="text-gray-700 font-medium text-lg flex items-center">
                            <svg class="w-6 h-6 mr-2 text-green-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                            No event requests are pending your final review.
                        </p>
                    </div>
                `;
            }

            const requestsHtml = pendingRequests.map(req => `
                <div class="p-5 bg-white rounded-xl shadow-lg border-l-4 border-yellow-500 transition-all duration-300 hover:shadow-xl">
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="text-xl font-extrabold text-[#5d3a8e]">${req.title} (V${req.currentVersion})</h4>
                        <span class="event-status status-pending">
                            <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Pending Your Final Review
                        </span>
                    </div>
                    
                    <p class="text-sm text-gray-600 mb-3">Submitted by: <span class="font-semibold">${req.requestedBy}</span></p>
                    
                    <div class="p-4 bg-gray-50 rounded-lg border">
                        <h5 class="text-sm font-bold text-gray-700 mb-2">Assigned Resources (by President):</h5>
                        <div class="grid grid-cols-2 text-sm text-gray-700 gap-x-4 gap-y-1">
                            <p class="font-medium">Venue: <span class="font-extrabold">${req.resources.venue}</span></p>
                            <!-- CRITICAL: BUDGET HIGHLIGHT -->
                            <p class="font-medium text-lg">Budget: <span class="font-extrabold text-red-600">PKR ${req.resources.budget}</span></p>
                            <p class="col-span-2 font-medium">Items: <span class="font-extrabold">${req.resources.items}</span></p>
                        </div>
                    </div>

                    <details class="mt-4 text-sm cursor-pointer">
                        <summary class="font-semibold text-[#9275B7] hover:text-[#5d3a8e]">View Full Description</summary>
                        <p class="text-gray-600 mt-2 p-3 bg-gray-50 rounded-lg border">${req.description}</p>
                    </details>
                    
                    <div class="flex justify-end space-x-3 mt-6 border-t pt-4">
                        <button onclick="openFeedbackModal('${req.id}')" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition">
                            Request Revision (to HOD)
                        </button>
                        <button onclick="handleEventApproval('${req.id}')" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg shadow-md transition">
                            FINAL APPROVE
                        </button>
                    </div>
                </div>
            `).join('');
            
            return `<div class="space-y-6">${requestsHtml}</div>`;
        }
        
        function renderViewEventHistory() {
             if (allEventHistory.length === 0) {
                 return `<div class="bg-white p-6 rounded-xl shadow-lg"><p class="text-gray-500">No events found in history.</p></div>`;
            }
            
            const historyHtml = allEventHistory.map(event => {
                let statusClass = 'status-pending';
                if (event.status.includes('Approved')) statusClass = 'status-approved';
                if (event.status.includes('HOD')) statusClass = 'status-pending';
                if (event.status.includes('Affairs')) statusClass = 'status-pending'; // Pending SA
                
                return `
                    <tr class="hover:bg-gray-50">
                        <td class="p-3 border-b">${event.title}</td>
                        <td class="p-3 border-b">${event.term || 'N/A'}</td>
                        <td class="p-3 border-b">${event.eventDate}</td>
                        <td class="p-3 border-b">
                            <span class="event-status ${statusClass}">${event.status}</span>
                        </td>
                         <td class="p-3 border-b text-sm font-semibold">PKR ${event.resources.budget || 'N/A'}</td>
                    </tr>
                `;
            }).join('');

            return `
                <div class="bg-white p-6 rounded-xl shadow-lg overflow-x-auto">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="bg-gray-100">
                                <th class="p-3 font-semibold text-gray-600">Event Title</th>
                                <th class="p-3 font-semibold text-gray-600">Term</th>
                                <th class="p-3 font-semibold text-gray-600">Date</th>
                                <th class="p-3 font-semibold text-gray-600">Status</th>
                                <th class="p-3 font-semibold text-gray-600">Budget</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${historyHtml}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderViewSocietyTeam() {
            if (societyTeam.length === 0) {
                 return `<div class="bg-white p-6 rounded-xl shadow-lg"><p class="text-gray-500">No team members found.</p></div>`;
            }
            
            const teamHtml = societyTeam.map(member => `
                <div class="p-4 bg-white rounded-xl shadow-lg border border-gray-200 transition-all duration-300 hover:shadow-xl text-center">
                    <img src="https://placehold.co/100x100/9275B7/ffffff?text=${member.name.charAt(0)}" alt="${member.name}" class="w-20 h-20 rounded-full mx-auto mb-3 border-4 border-white shadow-md">
                    <h4 class="text-lg font-bold text-[#5d3a8e]">${member.name}</h4>
                    <p class="text-sm font-semibold text-gray-700">${member.role}</p>
                    <p class="text-xs text-gray-500">${member.regId}</p>
                </div>
            `).join('');

            return `
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    ${teamHtml}
                </div>
            `;
        }
        
        function renderProfileManagement() {
            const defaultPic = 'https.placehold.co/100x100/cccccc/333333?text=P';
            
            return `
                <div class="bg-white p-8 rounded-xl shadow-lg border-t-4 border-[#5d3a8e] mb-8">
                    <div class="flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-8 mb-6 border-b pb-4">
                        <img src="${userProfile.picUrl || defaultPic}" onerror="this.onerror=null;this.src='${defaultPic}'" alt="Profile Pic" class="w-24 h-24 rounded-full object-cover border-4 border-[#5d3a8e] shadow-xl">
                        <div class="text-center md:text-left">
                            <p class="font-extrabold text-2xl text-[#5d3a8e]">${userName}</p>
                            <p class="font-semibold text-md text-gray-700">Reg ID: ${userRegId}</p>
                            <p class="text-sm text-gray-500">Role: Student Affairs</p>
                        </div>
                    </div>

                    
                    <h3 class="text-xl font-bold mb-4 text-gray-800 border-b pb-2">Update Profile Details</h3>
                    <form onsubmit="handleProfileUpdate(event)" class="max-w-lg space-y-4">
                        
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2" for="phone">Phone Number</label>
                            <input class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#5d3a8e] focus:border-[#5d3a8e] transition" id="phone" name="phone" type="tel" value="${userProfile.phone || ''}" placeholder="+92 300 xxxxxxx">
                        </div>
                        
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2" for="address">Address</label>
                            <input class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#5d3a8e] focus:border-[#5d3a8e] transition" id="address" name="address" type="text" value="${userProfile.address || ''}" placeholder="H. No. / Street / Town">
                        </div>

                        <div>
                            <label class="block text-gray-700 font-semibold mb-2" for="picUrl">Profile Picture URL</label>
                            <input class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#5d3a8e] focus:border-[#5d3a8e] transition" id="picUrl" name="picUrl" type="url" value="${userProfile.picUrl || ''}" placeholder="https://placehold.co/100x100">
                        </div>

                        <button type="submit" class="btn-primary text-white font-bold py-2 px-4 rounded-lg shadow-md transition duration-150">
                            Save Profile Details
                        </button>
                    </form>
                    
                    <hr class="my-8 border-gray-200">
                    
                    
                    <h3 class="text-xl font-bold mb-4 text-gray-800 border-b pb-2">Change Password</h3>
                    <form onsubmit="handlePasswordUpdate(event)" class="max-w-md">
                        <div class="mb-4">
                            <label class="block text-gray-700 font-semibold mb-2" for="new-password">New Password</label>
                            <input class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#5d3a8e] focus:border-[#5d3a8e] transition" id="new-password" name="newPassword" type="password" required minlength="6" placeholder="At least 6 characters">
                        </div>
                        <button type="submit" class="bg-[#9275B7] hover:bg-[#a68bc4] text-white font-bold py-2 px-4 rounded-lg shadow-md transition duration-150">
                            Update Password
                        </button>
                    </form>
                </div>
            `;
        }


        // Initialize the app on window load
        window.onload = initApp;

    </script>
</body>
</html>
