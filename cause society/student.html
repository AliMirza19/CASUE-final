<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - Cause Society CUST</title>
    <!-- Tailwind CSS CDN --><script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
        }
        .btn-primary { 
            background-color: #5d3a8e; 
            border: none; 
            transition: background-color 0.2s ease-in-out;
        }
        .btn-primary:hover { 
            background-color: #4a2f72; 
        }
        .scroll-area { max-height: calc(100vh - 120px); overflow-y: auto; }
        .event-status { display: inline-block; padding: 4px 10px; border-radius: 9999px; font-size: 0.8rem; font-weight: 600; }
        .status-pending { background-color: #fcd3a4; color: #92400e; }
        .status-approved { background-color: #10b981; color: #ecfdf5; }
        .status-rejected { background-color: #f87171; color: #fef2f2; }
        .status-review { background-color: #3b82f6; color: #eff6ff; }
        .status-forward { background-color: #a855f7; color: #f3e8ff; } 
        .modal-overlay { background-color: rgba(0, 0, 0, 0.75); }

        /* Custom scrollbar */
        .scroll-area::-webkit-scrollbar { width: 8px; }
        .scroll-area::-webkit-scrollbar-track { background: #e0e0e0; border-radius: 10px; }
        .scroll-area::-webkit-scrollbar-thumb { background-color: #9275B7; border-radius: 10px; border: 2px solid #e0e0e0; }
        .scroll-area::-webkit-scrollbar-thumb:hover { background-color: #5d3a8e; }
        
        /* Form focus styles */
        input:focus, textarea:focus, select:focus {
            border-color: #5d3a8e;
            box-shadow: 0 0 0 2px rgba(93, 58, 142, 0.4);
        }
        
        /* Modal Animation */
        .modal-content {
            transition: all 0.3s ease-out;
        }

        /* Workflow Stepper Animation */
        @keyframes pulse-dot {
            0%, 100% { box-shadow: 0 0 0 0 rgba(146, 117, 183, 0.7); }
            50% { box-shadow: 0 0 0 8px rgba(146, 117, 183, 0); }
        }
        .step-active .dot {
            animation: pulse-dot 2s infinite;
        }

        /* AI Chat Widget Styles */
        #ai-chat-window {
            transition: all 0.3s ease-in-out;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
            position: fixed;
            top: 100px;
            right: 50px;
        }
        #ai-chat-window.open {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
        }
        .chat-msg {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .chat-msg.ai {
            background-color: #f3f4f6;
            color: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .chat-msg.user {
            background-color: #5d3a8e;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Top Navigation Bar (Themed Purple) -->

        <div class="flex items-center">

        </div>
    </nav>

    <div class="flex flex-1">
        
        <!-- Sidebar Navigation (Fixed) -->
        <aside id="app-sidebar" class="w-64 bg-white p-4 shadow-xl sticky top-0 h-screen overflow-y-auto z-0 hidden" style="padding-top: 1rem; border-right: 1px solid #e5e7eb;">
            <nav class="space-y-2" id="sidebar-nav">
                <!-- Sidebar content will be rendered by renderSidebar() -->
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main id="app-container" class="flex-1 p-4 md:p-8 bg-gray-50">
            
            <div id="message-box" class="fixed top-20 right-5 z-50 transition-transform duration-500 transform translate-x-full"></div>

            <div id="main-content">
                <!-- Content will be rendered here by renderApp function -->
                <div class="max-w-xl mx-auto p-6 bg-white shadow-xl rounded-xl">
                    <p class="text-center text-gray-600 mb-6">System is Loading...</p>
                </div>
            </div>
        </main>
    </div>

    
    <!-- Modal for Event Revision -->
    <div id="revision-modal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-8 modal-content transform transition-all duration-300 scale-95 opacity-0">
            <h3 class="text-2xl font-bold mb-4 text-red-600">Event Revision Required</h3>
            <p id="revision-feedback" class="mb-4 text-sm text-gray-700 p-3 bg-red-100 rounded-lg"></p>
            <form id="revision-form" onsubmit="handleEventRevisionSubmission(event)">
                <input type="hidden" name="eventId" id="revision-eventId">
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2" for="revision-description">Revised Description</label>
                    <textarea class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#5d3a8e] transition duration-200" id="revision-description" name="description" rows="4" required></textarea>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeRevisionModal()" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-lg">
                        Cancel
                    </button>
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">
                        Submit New Version
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- AI Chat Widget -->
    <div id="ai-chat-window" class="fixed top-24 left-6 w-80 bg-white rounded-xl shadow-2xl border border-gray-200 flex flex-col z-40 overflow-hidden" style="height: 400px;">
        <div class="bg-[#5d3a8e] p-3 text-white flex justify-between items-center">
            <div class="flex items-center">
                <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                <span class="font-bold text-sm">CAUSE Society AI Agent</span>
            </div>
            <button onclick="toggleChat('ai-chat-window')" class="text-white hover:text-gray-200">&times;</button>
        </div>
        <div id="chat-messages" class="flex-1 p-4 overflow-y-auto flex flex-col bg-gray-50">
            <div class="chat-msg ai">Hello! I am your society assistant. Ask me about events, how to apply, or check election status!</div>
        </div>
        <form onsubmit="handleChatSubmit(event)" class="p-3 border-t bg-white flex">
            <input type="text" id="chat-input" class="flex-1 p-2 text-sm border border-gray-300 rounded-l-lg focus:outline-none focus:ring-1 focus:ring-[#5d3a8e]" placeholder="Type a question..." required autocomplete="off">
            <button type="submit" class="bg-[#5d3a8e] hover:bg-[#4a2f72] text-white px-3 rounded-r-lg">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            </button>
        </form>
    </div>

    <!-- Floating Chat Button -->
    <button id="fab-chat" onclick="toggleChat('ai-chat-window')" class="fixed bottom-6 right-6 bg-[#5d3a8e] hover:bg-[#4a2f72] text-white p-4 rounded-full shadow-xl hover:shadow-2xl transition duration-200 ease-in-out transform hover:scale-110 focus:outline-none z-40">
        <!-- AI Robot Icon -->
        <svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>

        </svg>

    <script>

        let userId = null;

        let currentView = 'login'; // Start at login

        // --- Election State (Mocked) ---

        // --- Utility Functions ---

        function showMessage(message, type = 'success', duration = 4000) {
            const box = document.getElementById('message-box');
            if (!box) return;

            const bgColor = type === 'error' ? 'bg-red-500' : type === 'warning' ? 'bg-yellow-500' : 'bg-green-500';
            const html = `
                <div class="${bgColor} text-white p-4 rounded-xl shadow-2xl mb-3 flex items-center">
                    <span class="flex-grow">${message}</span>
                    <button onclick="this.parentNode.remove()" class="ml-4 font-bold">&times;</button>
                </div>
            `;
            box.insertAdjacentHTML('afterbegin', html);
            box.classList.remove('translate-x-full');
            box.classList.add('translate-x-0');

            setTimeout(() => {
                const elementToRemove = box.lastElementChild;
                if (elementToRemove) elementToRemove.remove();
                if (box.children.length === 0) {
                    box.classList.remove('translate-x-0');
                    box.classList.add('translate-x-full');
                }
            }, duration);
        }
        window.showMessage = showMessage;
        
        function escapeHtmlAttribute(str) {
            if (!str) return '';
            return String(str).replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, '');
        }
        
        // --- AI Chat Logic ---
        window.toggleChat = function(windowId) {
            const chatWindow = document.getElementById(windowId);
            chatWindow.classList.toggle('open');
            if (chatWindow.classList.contains('open')) {
                setTimeout(() => chatWindow.querySelector('input').focus(), 100);
            }
        }
        window.toggleChat = toggleChat;

        window.handleChatSubmit = function(e) {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            addChatMessageToWindow(message, 'user', 'chat-messages');
            input.value = '';

            setTimeout(() => {
                const response = generateAIResponse(message);
                addChatMessageToWindow(response, 'ai', 'chat-messages');
            }, 600);
        }
        window.handleChatSubmit = handleChatSubmit;

        function addChatMessageToWindow(text, sender, containerId) {
            const chatContainer = document.getElementById(containerId);
            if (!chatContainer) return;
            const div = document.createElement('div');
            div.className = `chat-msg ${sender}`;
            
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function generateAIResponse(query) {
            const q = query.toLowerCase();

            if (q.includes('hello') || q.includes('hi') || q.includes('salam')) {
                return "Wa alaikum assalam! How can I help you today?";
            }
            if (q.includes('event') && (q.includes('upcoming') || q.includes('list'))) {
                if (publicEvents.length === 0) return "There are no upcoming events scheduled right now.";
                const titles = publicEvents.map(e => e.title).join(', ');
                return `Upcoming events are: ${titles}. Check the 'Events & Activities' tab for details.`;
            }
            if (q.includes('submit') || q.includes('apply') || q.includes('request')) {
                return "You can submit a new event request by going to the 'Authorization Form' tab in the sidebar.";
            }
            if (q.includes('status') || q.includes('track')) {
                return "You can track the status of your submitted events in the 'Track My Submissions' section.";
            }
            if (q.includes('volunteer')) {
                return "We always need volunteers! Click 'Join as Volunteer' in the sidebar to register.";
            }
            if (q.includes('president') || q.includes('election')) {
                return "The Presidential Elections are currently in the 'Cabinet Submission' phase. Check the Elections tab.";
            }
            if (q.includes('who are you')) {
                return "I am the CAUSE Society AI Agent, here to help you navigate the dashboard.";
            }

            return "I'm not sure about that. Try asking about events, elections, or how to submit a request.";
        }
        
        // --- UI Helper Functions ---
        function getFriendlyTitle(view) {
            const titles = {
                'overview': 'Dashboard (Overview)',

                'status': 'Track My Submissions',
                'volunteer': 'Join as Volunteer',
                'elections': 'Presidential Elections',
                'profile': 'Profile Settings',
                'login': 'Welcome',
            };
            return titles[view] || 'Dashboard';
        }

        function getFriendlySubtitle(view) {
            const subtitles = {
                'overview': `Welcome back, ${userName || 'Student'}. Here's what's happening.`,
                'view-events': 'Browse all upcoming and past society events.',
                'request-event': 'Fill out the official authorization form for new activities.',
                'status': 'Check the status and feedback on your submissions.',
                'volunteer': 'Join the volunteer team and make a difference.',
                'elections': 'Participate in the society leadership elections.',
                'profile': 'Update your personal details and change your password.',
                'login': 'Log in to the CAUSE Society Portal.',
            };
            return subtitles[view] || `Welcome, ${userName || 'Student'}.`;
        }

            publicPosts = [
                { id: 'p1', title: 'Welcome to Fall Term 2025!', description: 'The Cause Society is excited to welcome new and returning students. Get ready for an action-packed term with new events and opportunities.', author: 'President Adil Saleem', createdAt: new Date().toISOString(), isPublished: true, imageUrl: 'https://placehold.co/400x200/9275B7/ffffff?text=Welcome+Post' },

                { id: 'cand_2', name: 'Ali Hamza', regId: 'SE-2021-120', slogan: 'Bridging the gap between students and faculty.', isNominated: true, profileSubmitted: false, picUrl: 'https://placehold.co/60x60/3b82f6/ffffff?text=A', vision: 'N/A', experience: 'N/A', social: 'N/A', vp_name: 'N/A' },
                { id: 'mock-user-123', name: 'Student Uzair Shah', regId: 'SE-2023-100', slogan: 'My Slogan', isNominated: true, profileSubmitted: false, picUrl: 'https://placehold.co/100x100/9275B7/ffffff?text=US', vision: 'N/A', experience: 'N/A', social: 'N/A', vp_name: 'N/A' },

            // Student Pool Data for Search (Mock) --- MUST BE RE-INITIALIZED HERE
            allStudents = [
                { regId: 'SE-2023-100', name: 'Student Uzair Shah' },
                { regId: 'SE-2022-005', name: 'Zainab Qureshi' },
                { regId: 'SE-2021-120', name: 'Ali Hamza' },

                { regId: 'SE-2024-050', name: 'Fatima Jilani' }
            ];

            if (userRequests.length === 0) {
                 userRequests.push(
                    { id: 'req_mock_1', title: 'Gaming Fiesta 2025', description: 'Sample: A departmental gaming tournament for CS/SE students. We need 10 PCs and projector access.', eventDate: '2025-12-05', eventTime: '11:00', venue: 'Library Hall', currentVersion: 2, status: 'Final Approved', requestedBy: userId, facultyMentorId: 'faculty_f1', feedback: [], history: [] },
                    { id: 'req_mock_3', title: 'Workshop on UI/UX Design', description: 'A one-day workshop for final year students on modern UI/UX principles.', eventDate: '2026-01-20', eventTime: '09:00', venue: 'Seminar Room 3', currentVersion: 1, status: 'Pending Student Forward', requestedBy: userId, facultyMentorId: 'faculty_f1', feedback: [{ message: 'Looks good. Please forward to Patron.', role: 'President', timestamp: new Date().toISOString() }], history: [] },

            userProfile = {

        // --- Initialization and Mock Auth Setup ---

        function initApp() {
            isAuthReady = true;
            loadSampleData(null); 
            window.renderApp('login'); 
        }
        window.initApp = initApp;
        
        // --- Mock Authentication Handlers ---
        
        function handleLogin(e) {
            e.preventDefault();
            const regId = e.target.regId.value;
            
            // Log in as mock user
            userId = 'mock-user-123';
            userName = 'Student Uzair Shah'; 
            userRegId = regId || 'SE-2023-100'; 
            
            // Load sample data *based on logged-in user*
            loadSampleData(userRegId);
            
            showMessage(`Welcome back, ${userName}!`, 'success');
            window.renderApp('overview'); // Navigate to dashboard
        }
        window.handleLogin = handleLogin;

        function handleLogout() {
            userId = null;
            userName = '';
            userRegId = '';
            userProfile = {};
            userRequests = []; // Clear user-specific data
            hasUserVoted = false; // Reset vote status
            currentElectionPhase = 'Cabinet_Submission'; // Reset election phase
            
            showMessage("You have been successfully logged out.");
            window.renderApp('login');
            window.toggleChat('ai-chat-window'); // Close chat on logout
        }
        window.handleLogout = handleLogout;
        
        async function handlePasswordUpdate(e) {
            e.preventDefault();
            showMessage("Password successfully updated (Demo).", 'success');
            e.target.reset(); 
        }
        window.handlePasswordUpdate = handlePasswordUpdate;

        async function handleProfileUpdate(e) {
            e.preventDefault();
            showMessage("Profile details updated successfully (Demo).", 'success');
            window.renderApp('profile'); 
        }
        window.handleProfileUpdate = handleProfileUpdate;


        // --- Mock Student Specific Logic ---

        async function submitEventRequest(e) {
            e.preventDefault();
            const form = e.target;
            
            // Collect Budget Items
            let requirementsList = [];
            const reqInputs = form.querySelectorAll('.req-row');
            reqInputs.forEach(row => {
                const item = row.querySelector('.req-item').value;
                const rate = row.querySelector('.req-rate').value;
                const amount = row.querySelector('.req-amount').value;
                if(item) requirementsList.push({item, rate: parseInt(rate) || 0, amount: parseInt(amount) || 0});
            });

            // Collect Organizers
            let organizers = [];
            document.querySelectorAll('.organizer-entry').forEach(div => {
                const name = div.querySelector('.org-name').innerText;
                const reg = div.querySelector('.org-regId').innerText;
                const role = div.querySelector('.org-role-input').value || 'Organizer';
                organizers.push({ name, reg, role });
            });
            if (organizers.length === 0) {
                 return showMessage("Please add at least one organizer (you should be one).", 'error');
            }


            // Create a new request object matching the form
            const newRequest = {
                id: 'mock_req_' + Date.now(),
                title: form.title.value,
                description: "Activity: " + form.activityType.value + ". Detailed Description: " + form.description.value, // Combined for display
                eventDate: form.eventDate.value,
                eventTime: form.eventTime.value,
                venue: form.venue.value,
                duration: form.duration.value,
                guestSpeaker: form.guestSpeaker.value || 'N/A',
                guestDesignation: form.guestDesignation.value || 'N/A',
                requestedBy: userId,
                requesterName: userName,
                requesterRegId: userRegId,
                facultyMentorId: form.facultyMentorId.value,
                contactPerson: {
                    name: form.contactName.value,
                    regId: form.contactRegId.value,
                    mobile: form.contactMobile.value
                },
                organizers: organizers,
                requirements: requirementsList, // Store as objects
                status: 'Pending President', 
                currentVersion: 1,
                feedback: [],
                createdAt: new Date().toISOString(),
                history: [{ stage: 'Student Submission', timestamp: new Date().toISOString() }],
            };

            // Add to the local array
            userRequests.unshift(newRequest);
            
            showMessage("Event Request submitted successfully! Redirecting to tracking...", 'success');
            window.renderApp('status'); // Navigate to status view
        }
        window.submitEventRequest = submitEventRequest;

        window.openRevisionModal = function(eventId, currentTitle, currentDescription, lastFeedback) {
            const feedbackText = lastFeedback.replace(/\\'/g, "'").replace(/\\"/g, '"').replace(/\\n/g, '\n');
            const descriptionText = currentDescription.replace(/\\'/g, "'").replace(/\\"/g, '"').replace(/\\n/g, '\n');

        function getWorkflowStep(status) {
            if (status === 'Pending President') return 2;
            if (status === 'Pending Student Forward') return 3;
            if (status === 'Pending Patron') return 4;
            if (status === 'Pending HOD') return 5;
            if (status.includes('Affairs')) return 6;
            if (status.includes('Approved')) return 7; 
            if (status.includes('Review')) return 1; 
            return 1; 
        }

        function renderWorkflowTracker(status) {
            const currentStep = getWorkflowStep(status);
            const stages = ['Submitted', 'President', 'Review', 'Patron', 'HOD', 'SA'];
            
            let html = '<div class="flex items-center w-full mt-4 mb-2">';
            
            stages.forEach((stage, index) => {
                const step = index + 1;
                let dotClass = 'bg-gray-300';
                let lineClass = 'bg-gray-300';
                let textClass = 'text-gray-400';
                let dotAnimation = '';

                if (step < currentStep) {
                    dotClass = 'bg-[#5d3a8e]';
                    lineClass = 'bg-[#5d3a8e]';
                    textClass = 'text-[#5d3a8e]';
                } else if (step === currentStep) {
                    dotClass = 'bg-[#9275B7]';
                    lineClass = 'bg-gray-300';
                    textClass = 'text-[#5d3a8e] font-bold';
                    dotAnimation = 'step-active';
                }

                if (stage === 'Review' && currentStep < 3) {
                     textClass = 'text-gray-400'; 
                }
                if (stage === 'Review' && status !== 'Pending Student Forward') {
                    stage = ''; 
                }

                html += `
                    <div class="flex flex-col items-center ${dotAnimation}">
                        <div class="dot w-4 h-4 rounded-full ${dotClass} z-10"></div>
                        <span class="text-xs mt-1 ${textClass}">${stage}</span>
                    </div>
                `;
                
                if (step < stages.length) {
                    html += `<div class="flex-1 h-1 ${lineClass} mb-4"></div>`;
                }
            });
            
            html += '</div>';
            return html;
        }

        function renderEventStatusView() {
            if (userRequests.length === 0) {
                return `

                    </div>
                `;
            }

            const statusHtml = userRequests.map(req => {
                let statusClass = 'status-pending';
                let borderColor = 'border-yellow-500';
                let icon = `<svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
                let actionBlock = '';

                if (req.status.includes('Approved')) {
                    statusClass = 'status-approved';
                    borderColor = 'border-green-600';
                    icon = `<svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>`;
                } else if (req.status.includes('Reject')) {
                    statusClass = 'status-rejected';
                    borderColor = 'border-red-600';
                    icon = `<svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg>`;
                
                // ACTION: REVISION (Red Feedback)
                } else if (req.status.includes('Student Review')) {
                    statusClass = 'status-review';
                    borderColor = 'border-blue-600';
                    icon = `<svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>`;
                    
                    const lastFeedback = req.feedback && req.feedback.length > 0 ? escapeHtmlAttribute(req.feedback[req.feedback.length - 1].message) : 'No detailed feedback available.';
                    const safeDescription = escapeHtmlAttribute(req.description);
                    
                    actionBlock = `
                        <div class="mt-4 p-4 bg-red-50 border border-red-300 rounded-lg">
                            <p class="font-bold text-red-700 flex items-center mb-1">
                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                                Feedback Received:
                            </p>
                            <p class="text-red-600 text-sm italic ml-2">${lastFeedback.replace(/\\n/g, '<br>')}</p>
                            <button onclick="openRevisionModal('${req.id}', '${req.title}', '${safeDescription}', '${lastFeedback}')" 
                                    class="mt-3 text-white bg-blue-600 hover:bg-blue-700 text-sm py-2 px-4 rounded-lg font-medium shadow-md transition">
                                <span class="flex items-center">
                                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                                    Submit Revision
                                </span>
                            </button>
                        </div>
                    `;
                
                // ACTION: FORWARD (Green Feedback)
                } else if (req.status.includes('Student Forward')) {
                    statusClass = 'status-forward';
                    borderColor = 'border-purple-600';
                    icon = `<svg class="w-4 h-4 mr-2" fill="currentColor" viewBox="0 0 20 20"><path d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"></path></svg>`;
                    
                    const lastFeedback = req.feedback && req.feedback.length > 0 ? escapeHtmlAttribute(req.feedback[req.feedback.length - 1].message) : 'No detailed feedback available.';
                    
                    actionBlock = `
                        <div class="mt-4 p-4 bg-green-50 border border-green-300 rounded-lg">
                            <p class="font-bold text-green-700 flex items-center mb-1">
                                <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                                President's Approval:
                            </p>
                            <p class="text-green-600 text-sm italic ml-2">${lastFeedback.replace(/\\n/g, '<br>')}</p>
                            <button onclick="handleForwardToPatron('${req.id}')" 
                                    class="mt-3 text-white bg-purple-600 hover:bg-purple-700 text-sm py-2 px-4 rounded-lg font-medium shadow-md transition">
                                <span class="flex items-center">
                                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                                    Approve & Forward to Patron
                                </span>
                            </button>
                        </div>
                    `;
                }
                
                return `
                    <div class="p-5 bg-white rounded-xl shadow-lg border-l-4 ${borderColor} transition-all duration-300 hover:shadow-xl">
                        <div class="flex justify-between items-start mb-2">
                            <h4 class="text-xl font-extrabold text-[#5d3a8e]">${req.title} (V${req.currentVersion})</h4>
                            <span class="event-status ${statusClass}">${icon} ${req.status}</span>
                        </div>
                        
                        <p class="text-sm text-gray-600 mb-1">Date: ${req.eventDate} @ ${req.eventTime}</p>
                        
                        <!-- NEW WORKFLOW TRACKER -->
                        ${renderWorkflowTracker(req.status)}

                        <!-- Action Block (Feedback or Forward) -->
                        ${actionBlock}
                    </div>
                `;
            }).join('');

            return `
                <p class="text-gray-600 mb-6 font-medium">Monitor the approval workflow and address any required revisions promptly.</p>
                <div id="student-requests-list" class="space-y-6">
                    ${statusHtml}
                </div>
            `;
        }
        window.renderEventStatusView = renderEventStatusView;

                        <p class="text-lg text-gray-700 mb-4">If you are eligible, you can submit your candidacy to become the next Society President.</p>
                        ${enrollmentStatus}
                        <button onclick="handlePresidentialNomination()" 
                                ${userProfile.isNominated ? 'disabled' : ''}
                                class="mt-4 bg-[#5d3a8e] hover:bg-[#4a2f72] text-white font-bold py-2 px-6 rounded-lg transition duration-150 shadow-md ${userProfile.isNominated ? 'opacity-50 cursor-not-allowed' : ''}">
                            ${userProfile.isNominated ? 'Nomination Submitted' : 'Enroll as Candidate'}
                        </button>
                    </div>
                    <h3 class="text-xl font-bold mt-8 mb-4 text-gray-800">Current Nominated Candidates</h3>
                    <div class="space-y-4">
                        ${renderCandidateList(true)}
                    </div>
                `;
            
            } else if (currentElectionPhase === 'Cabinet_Submission') {
                if (userProfile.isPresidentialCandidate) {
                    // Candidate needs to submit profile
                    content = renderCandidateProfileSubmissionForm();
                } else {
                    // This user is NOT a candidate
                    content = `
                        <div class="p-6 bg-white border-l-4 border-blue-600 rounded-xl shadow-lg">
                            <p class="text-xl font-semibold text-blue-700">Election Update</p>
                            <p class="text-gray-600 mt-2">Candidates have been finalized and are currently submitting their profiles. Voting will begin soon!</p>
                        </div>
                    `;
                }
            
            } else if (currentElectionPhase === 'Voting') {
                // ... (Voting lockdown logic kept for completeness)
                if (hasUserVoted) {
                    content = `
                        <h2 class="text-2xl font-bold mb-6 text-gray-800">Presidential Elections</h2>
                        <div class="p-6 bg-white border-l-4 border-green-600 rounded-xl shadow-lg">
                            <p class="text-xl font-bold text-green-700 flex items-center"><svg class="w-6 h-6 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>Thank You! Your vote has been recorded.</p>
                            <p class="text-gray-600 mt-2">You have successfully participated in the election. Results will be announced soon.</p>
                        </div>
                        <h3 class="text-xl font-bold mt-8 mb-4 text-gray-800">Current Candidates (For Reference)</h3>
                        <div class="space-y-4">
                            ${renderCandidateList(true)}
                        </div>
                    `;
                } else {
                    content = `
                        <h2 class="text-2xl font-bold mb-6 text-red-600">Presidential Election - CAST YOUR VOTE!</h2>
                        <div class="p-4 bg-red-50 border border-red-300 rounded-lg mb-6 shadow-lg">
                            <p class="font-semibold text-red-800 flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>
                                ELECTION LOCKDOWN: Your dashboard access is restricted until you cast your vote.
                            </p>
                        </div>
                        
                        <h3 class="text-xl font-bold mb-4 text-gray-800">Select Your Candidate:</h3>
                        <div class="space-y-4">
                            ${renderCandidateList(false)}
                        </div>
                    `;
                }
            } else { // Inactive
                content = `
                    <div class="p-6 bg-white border-l-4 border-gray-400 rounded-xl shadow-lg">
                        <p class="text-xl font-semibold text-gray-700">The Presidential Election is currently inactive.</p>
                        <p class="text-gray-600 mt-2">Please check back later for announcements on nomination and voting phases.</p>
                    </div>
                `;
            }
            
            return content;
        }
        window.renderElectionVoting = renderElectionVoting;

        function renderViewAllEvents() {
            if (publicEvents.length === 0) {
                 return `
                    <div class="bg-white p-6 rounded-xl shadow-lg border-l-4 border-gray-300">
                        <p class="text-gray-500">No Final Approved Events are available at the moment.</p>
                    </div>
                `;
            }
            
            const eventsHtml = publicEvents.map(event => {
                const mentor = facultyList.find(f => f.uid === event.facultyMentorId);
                
                return `
                    <div class="p-5 bg-white rounded-xl shadow-lg border-l-4 border-[#5d3a8e] transition-all duration-300 hover:shadow-xl">
                        <h4 class="text-xl font-bold text-[#5d3a8e] mb-1">${event.title}</h4>
                        <p class="text-xs text-gray-500 mb-3 font-semibold">Status: <span class="font-bold text-green-600">Approved</span></p>
                        
                        <div class="grid grid-cols-2 text-sm text-gray-700 gap-x-4 gap-y-1">
                            <p class="font-medium">Date: <span class="font-extrabold">${event.eventDate}</span></p>
                            <p class="font-medium">Time: <span class="font-extrabold">${event.eventTime}</span></p>
                            <p class="col-span-2 font-medium">Venue: <span class="font-extrabold">${event.venue || 'TBD'}</span></p>
                            <p class="col-span-2 font-medium">Mentor: <span class="font-extrabold">${mentor ? mentor.name : 'Not Found'}</span></p>
                        </div>
                        
                        <details class="mt-4 text-sm cursor-pointer">
                            <summary class="font-semibold text-[#9275B7] hover:text-[#5d3a8e]">View Details</summary>
                            <p class="text-gray-600 mt-2 p-2 bg-gray-50 rounded-lg">${event.description}</p>
                        </details>
                    </div>
                `;
            }).join('');

            return `
                <p class="text-gray-600 mb-6 font-medium">These events are officially approved and scheduled by Student Affairs.</p>
                <div class="space-y-6">
                    ${eventsHtml}
                </div>
            `;
        }
        window.renderViewAllEvents = renderViewAllEvents;
        
        function renderProfileManagement() {
            const defaultPic = 'https://placehold.co/100x100/cccccc/333333?text=P';
            
            return `
                <div class="bg-white p-8 rounded-xl shadow-lg border-t-4 border-[#5d3a8e] mb-8">
                    <div class="flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-8 mb-6 border-b pb-4">
                        <img src="${userProfile.picUrl || defaultPic}" onerror="this.onerror=null;this.src='${defaultPic}'" alt="Profile Pic" class="w-24 h-24 rounded-full object-cover border-4 border-[#5d3a8e] shadow-xl">
                        <div class="text-center md:text-left">
                            <p class="font-extrabold text-2xl text-[#5d3a8e]">${userName}</p>
                            <p class="font-semibold text-md text-gray-700">Reg ID: ${userRegId}</p>
                            <p class="text-sm text-gray-500">UID: ${userId.substring(0, 10)}...</p>
                        </div>
                    </div>

                    
                    <h3 class="text-xl font-bold mb-4 text-gray-800 border-b pb-2">Update Profile Details</h3>
                    <form onsubmit="handleProfileUpdate(event)" class="max-w-lg space-y-4">
                        
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2" for="phone">Phone Number</label>
                            <input class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#5d3a8e] focus:border-[#5d3a8e] transition" id="phone" name="phone" type="tel" value="${userProfile.phone || ''}" placeholder="+92 300 xxxxxxx">
                        </div>
                        
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2" for="address">Address</label>
                            <input class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#5d3a8e] focus:border-[#5d3a8e] transition" id="address" name="address" type="text" value="${userProfile.address || ''}" placeholder="H. No. / Street / Town">
                        </div>

                        <div>
                            <label class="block text-gray-700 font-semibold mb-2" for="picUrl">Profile Picture URL</label>
                            <input class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#5d3a8e] focus:border-[#5d3a8e] transition" id="picUrl" name="picUrl" type="url" value="${userProfile.picUrl || ''}" placeholder="https://placehold.co/100x100">
                        </div>

                        <button type="submit" class="btn-primary text-white font-bold py-2 px-4 rounded-lg shadow-md transition duration-150">
                            Save Profile Details
                        </button>
                    </form>
                    
                    <hr class="my-8 border-gray-200">
                    
                    
                    <h3 class="text-xl font-bold mb-4 text-gray-800 border-b pb-2">Change Password</h3>
                    <form onsubmit="handlePasswordUpdate(event)" class="max-w-md">
                        <div class="mb-4">
                            <label class="block text-gray-700 font-semibold mb-2" for="new-password">New Password</label>
                            <input class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#5d3a8e] focus:border-[#5d3a8e] transition" id="new-password" name="newPassword" type="password" required minlength="6" placeholder="At least 6 characters">
                        </div>
                        <button type="submit" class="bg-[#9275B7] hover:bg-[#a68bc4] text-white font-bold py-2 px-4 rounded-lg shadow-md transition duration-150">
                            Update Password
                        </button>
                    </form>
                </div>
            `;
        }
        window.renderProfileManagement = renderProfileManagement;


        // Initialize the app on window load
        window.onload = initApp;

    </script>
</body>
</html>
