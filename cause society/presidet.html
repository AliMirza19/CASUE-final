<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>President Dashboard - Cause Society CUST</title>
    <!-- Tailwind CSS CDN --><script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #ffffff; 
        }
        .btn-primary { 
            background-color: #5d3a8e; 
            border: none; 
            transition: background-color 0.2s ease-in-out;
        }
        .btn-primary:hover { 
            background-color: #4a2f72; 
        }
        .scroll-area { max-height: calc(100vh - 120px); overflow-y: auto; }
        .event-status { display: inline-block; padding: 4px 10px; border-radius: 9999px; font-size: 0.8rem; font-weight: 600; }
        .status-pending { background-color: #fcd34d; color: #92400e; }
        .status-approved { background-color: #10b981; color: #ecfdf5; }
        .status-rejected { background-color: #f87171; color: #fef2f2; }
        .status-review { background-color: #3b82f6; color: #eff6ff; }
        .status-forward { background-color: #a855f7; color: #f3e8ff; } 
        .modal-overlay { background-color: rgba(0, 0, 0, 0.75); }

        /* Custom scrollbar */
        .scroll-area::-webkit-scrollbar { width: 8px; }
        .scroll-area::-webkit-scrollbar-track { background: #e0e0e0; border-radius: 10px; }
        .scroll-area::-webkit-scrollbar-thumb { background-color: #9275B7; border-radius: 10px; border: 2px solid #e0e0e0; }
        .scroll-area::-webkit-scrollbar-thumb:hover { background-color: #5d3a8e; }
        
        /* Form focus styles */
        input:focus, textarea:focus, select:focus {
            border-color: #5d3a8e;
            box-shadow: 0 0 0 2px rgba(93, 58, 142, 0.4);
        }
        
        /* Modal Animation */
        .modal-content {
            transition: all 0.3s ease-out;
        }

        /* AI Chat Widget Styles */
        #ai-chat-window {
            transition: all 0.3s ease-in-out;
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }
        #ai-chat-window.open {
            opacity: 1;
            pointer-events: all;
            transform: translateY(0);
        }
        .chat-msg {
            max-width: 80%;
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .chat-msg.ai {
            background-color: #f3f4f6;
            color: #1f2937;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
        }
        .chat-msg.user {
            background-color: #5d3a8e;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Top Navigation Bar (Themed Purple) -->
    <nav id="app-header" class="bg-[#5d3a8e] p-4 flex items-center justify-between shadow-lg z-10 hidden">
        <div class="flex items-center">
            <img src="https://play-lh.googleusercontent.com/8QQUZDWOC8RpSqVsw2apjdnLiHvyLc1vJBpOC0MNQcE3_-JHv3XtW1K5m6YmVA6I-A" alt="CUST Logo" class="h-10 w-10 mr-3 rounded-full bg-white p-1">
            <span class="text-white text-xl font-extrabold">CAUSE Society</span>
            <span class="text-white text-sm ml-2 hidden md:inline opacity-80">President Portal</span>
        </div>
        
        <div class="flex items-center space-x-4">
            <!-- User Info and Profile Button -->
            <span id="header-user-info" class="text-white text-md font-semibold hidden sm:inline"></span>
            <button onclick="renderApp('profile')" class="relative text-white hover:opacity-80 transition duration-150">
                <img id="header-profile-pic" src="https://placehold.co/40x40/cccccc/333333?text=P" alt="Profile" class="h-10 w-10 rounded-full object-cover border-2 border-white shadow-md">
            </button>
            <button onclick="handleLogout()" class="bg-[#9275B7] hover:bg-[#a68bc4] text-white font-semibold py-1 px-3 rounded-lg text-sm transition duration-150">Logout</button>
        </div>
    </nav>

    <div class="flex flex-1">
        
        <!-- Sidebar Navigation (Fixed) -->
        <aside id="app-sidebar" class="w-64 bg-white p-4 shadow-xl sticky top-0 h-screen overflow-y-auto z-0 hidden" style="padding-top: 1rem; border-right: 1px solid #e5e7eb;">
            <nav class="space-y-2" id="sidebar-nav">
                <!-- Sidebar content will be rendered by renderSidebar() -->
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main id="app-container" class="flex-1 p-4 md:p-8 bg-gray-50">
            
            <div id="message-box" class="fixed top-20 right-5 z-50 transition-transform duration-500 transform translate-x-full"></div>

            <div id="main-content">
                <!-- Content will be rendered here by renderApp function -->
                <div class="max-w-xl mx-auto p-6 bg-white shadow-xl rounded-xl">
                    <p class="text-center text-gray-600 mb-6">System is Loading...</p>
                </div>
            </div>
        </main>
    </div>

    
    <!-- Modal for Feedback/Revision -->
    <div id="feedback-modal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-8 modal-content transform transition-all duration-300 scale-95 opacity-0">
            <h3 class="text-2xl font-bold mb-4 text-red-600">Request Revision</h3>
            <p class="mb-4 text-sm text-gray-700">The student will receive this feedback and must resubmit.</p>
            <form id="feedback-form" onsubmit="handleFeedbackSubmission(event)">
                <input type="hidden" name="eventId" id="feedback-eventId">
                <input type="hidden" name="feedbackType" id="feedback-type"> <!-- 'event' or 'graphic' -->
                <div class="mb-4">
                    <label class="block text-gray-700 font-semibold mb-2" for="feedback-message">Feedback Message</label>
                    <textarea class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#5d3a8e] transition duration-200" id="feedback-message" name="message" rows="4" required placeholder="e.g., Budget is too high, please revise..."></textarea>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeFeedbackModal()" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-lg">
                        Cancel
                    </button>
                    <button type="submit" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg">
                        Send Feedback
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal for Approval Comment (Optional) -->
    <div id="approve-modal" class="hidden fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-8 modal-content transform transition-all duration-300 scale-95 opacity-0">
            <h3 class="text-2xl font-bold mb-2 text-green-700">Approve Event</h3>
            <p class="mb-4 text-sm text-gray-700" id="approve-event-title">Event: ...</p>
            <form id="approve-form" onsubmit="handleApproveSubmission(event)">
                <input type="hidden" name="eventId" id="approve-eventId">
                <div class="mb-6">
                    <label class="block text-gray-700 font-semibold mb-2" for="approve-comment">Approval Note (Optional)</label>
                    <textarea class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#5d3a8e] transition" id="approve-comment" name="comment" rows="3" placeholder="e.g., Approved. Please forward to Patron for review."></textarea>
                </div>
                <div class="flex justify-end space-x-3">
                    <button type="button" onclick="closeApproveModal()" class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-lg">
                        Cancel
                    </button>
                    <button type="submit" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg">
                        Approve & Send to Student
                    </button>
                </div>
            </form>
        </div>
    </div>
    
    <!-- AI Chat Widget -->
    <div id="ai-chat-window" class="fixed bottom-24 right-6 w-80 bg-white rounded-xl shadow-2xl border border-gray-200 flex flex-col z-40 overflow-hidden" style="height: 400px;">
        <div class="bg-[#5d3a8e] p-3 text-white flex justify-between items-center">
            <div class="flex items-center">
                <svg class="h-5 w-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                <span class="font-bold text-sm">President's AI Assistant</span>
            </div>
            <button onclick="toggleChat()" class="text-white hover:text-gray-200">&times;</button>
        </div>
        <div id="chat-messages" class="flex-1 p-4 overflow-y-auto flex flex-col bg-gray-50">
            <div class="chat-msg ai">Hello President! I can help you check past events, review status, or draft announcements.</div>
        </div>
        <form onsubmit="handleChatSubmit(event)" class="p-3 border-t bg-white flex">
            <input type="text" id="chat-input" class="flex-1 p-2 text-sm border border-gray-300 rounded-l-lg focus:outline-none focus:ring-1 focus:ring-[#5d3a8e]" placeholder="Ask about events..." required autocomplete="off">
            <button type="submit" class="bg-[#5d3a8e] hover:bg-[#4a2f72] text-white px-3 rounded-r-lg">
                <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            </button>
        </form>
    </div>

    <!-- Floating Chat Button -->
    <button id="fab-chat" onclick="toggleChat()" class="hidden fixed bottom-6 right-6 bg-[#5d3a8e] hover:bg-[#4a2f72] text-white p-4 rounded-full shadow-xl hover:shadow-2xl transition duration-200 ease-in-out transform hover:scale-110 focus:outline-none z-40">
        <!-- AI Robot Icon -->
        <svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
        </svg>
    </button>

    
    <script>
        // NO FIREBASE SCRIPT (MOCK DEMO MODE)

        let userId = null;
        let userName = '';
        let userRegId = '';
        let userProfile = {}; 
        let isAuthReady = false;
        let currentView = 'login'; // Start at login
        
        // --- Mock Data States ---
        let presidentEventRequests = []; // Events pending president's review
        let graphicDesignRequests = []; // Graphics pending president's review
        let publicPosts = [];
        let publicEvents = [];
        let facultyList = [];

        // --- Utility Functions ---

        function showMessage(message, type = 'success', duration = 4000) {
            const box = document.getElementById('message-box');
            if (!box) return;

            const bgColor = type === 'error' ? 'bg-red-500' : type === 'warning' ? 'bg-yellow-500' : 'bg-green-500';
            const html = `
                <div class="${bgColor} text-white p-4 rounded-xl shadow-2xl mb-3 flex items-center">
                    <span class="flex-grow">${message}</span>
                    <button onclick="this.parentNode.remove()" class="ml-4 font-bold">&times;</button>
                </div>
            `;
            box.insertAdjacentHTML('afterbegin', html);
            box.classList.remove('translate-x-full');
            box.classList.add('translate-x-0');

            setTimeout(() => {
                const elementToRemove = box.lastElementChild;
                if (elementToRemove) elementToRemove.remove();
                if (box.children.length === 0) {
                    box.classList.remove('translate-x-0');
                    box.classList.add('translate-x-full');
                }
            }, duration);
        }
        window.showMessage = showMessage;
        
        function escapeHtmlAttribute(str) {
            if (!str) return '';
            return String(str).replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/'/g, "\\'").replace(/\n/g, '\\n').replace(/\r/g, '');
        }
        
        // --- UI Helper Functions ---
        function getFriendlyTitle(view) {
            const titles = {
                'overview': 'President Dashboard',
                'review-events': 'Review Event Requests',
                'review-graphics': 'Review Graphic Designs',
                'create-post': 'Create Announcement',
                'all-events': 'All Approved Events',
                'profile': 'Profile Settings',
                'login': 'Welcome, President',
            };
            return titles[view] || 'Dashboard';
        }

        function getFriendlySubtitle(view) {
            const subtitles = {
                'overview': `Welcome back, ${userName || 'President'}. Here's your society overview.`,
                'review-events': 'Approve or request revisions for student events.',
                'review-graphics': 'Review and approve designs submitted by the Graphic Designer.',
                'create-post': 'Publish new posts and announcements for all members.',
                'all-events': 'Browse all fully approved and scheduled society events.',
                'profile': 'Update your personal details and change your password.',
                'login': 'Log in to the CAUSE Society President Portal.',
            };
            return subtitles[view] || `Welcome, ${userName || 'President'}.`;
        }

        // --- AI Chat Logic ---
        window.toggleChat = function() {
            const chatWindow = document.getElementById('ai-chat-window');
            chatWindow.classList.toggle('open');
            if (chatWindow.classList.contains('open')) {
                setTimeout(() => document.getElementById('chat-input').focus(), 100);
            }
        }

        window.handleChatSubmit = function(e) {
            e.preventDefault();
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            // Add user message
            addChatMessage(message, 'user');
            input.value = '';

            // Simulate AI thinking delay
            setTimeout(() => {
                const response = generateAIResponse(message);
                addChatMessage(response, 'ai');
            }, 600);
        }

        function addChatMessage(text, sender) {
            const chatContainer = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = `chat-msg ${sender}`;
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function generateAIResponse(query) {
            const q = query.toLowerCase();

            if (q.includes('hello') || q.includes('hi') || q.includes('salam')) {
                return "Wa alaikum assalam President! How can I assist you with society matters today?";
            }
            if (q.includes('pending') && (q.includes('event') || q.includes('request'))) {
                const pendingCount = presidentEventRequests.filter(r => r.status === 'Pending President').length;
                if (pendingCount === 0) return "You have no pending event requests to review. Good job!";
                return `You have ${pendingCount} event request(s) waiting for your approval.`;
            }
            if (q.includes('graphic') || q.includes('design')) {
                const pendingGraphics = graphicDesignRequests.filter(r => r.status === 'Pending President Review').length;
                return `There are ${pendingGraphics} graphic design(s) pending your review.`;
            }
            if (q.includes('past') || q.includes('history') || q.includes('approved')) {
                 if (publicEvents.length === 0) return "No events have been finalized yet.";
                 const titles = publicEvents.map(e => e.title).join(', ');
                 return `The approved past/upcoming events are: ${titles}.`;
            }
            if (q.includes('announcement') || q.includes('post')) {
                return "You can create a new announcement by going to the 'Create Announcement' tab.";
            }

            return "I'm here to help with dashboard navigation, checking pending requests, or event history.";
        }


        // --- Sample Data Injection ---
        
        function loadSampleData() {
            facultyList = [
                { uid: 'faculty_f1', name: 'Dr. Fatima Khan', dept: 'Software Engineering' },
                { uid: 'faculty_m1', name: 'Engr. Saad Mahmood', dept: 'Computer Science' },
            ];

            publicPosts = [
                { id: 'p1', title: 'Welcome to Fall Term 2025!', description: '...', author: 'President Adil Saleem', createdAt: new Date().toISOString(), isPublished: true, imageUrl: 'https://placehold.co/400x200/9275B7/ffffff?text=Welcome+Post' },
                { id: 'p2', title: 'Elections Announcement', description: '...', author: 'Patron Dr. Usman Ali', createdAt: new Date(Date.now() - 86400000).toISOString(), isPublished: true, imageUrl: null },
            ];

            publicEvents = [
                { id: 'e1', title: 'Annual Code Marathon 2025', description: '...', eventDate: '2025-11-30', status: 'Final Approved' },
                { id: 'e2', title: 'Tech Talk: Future of AI', description: '...', eventDate: '2025-12-15', status: 'Final Approved' },
            ];
            
            // Data for President's review list
            if (presidentEventRequests.length === 0) {
                presidentEventRequests = [
                    { id: 'req_p1', title: 'DevDay Conference 2025', description: 'A full-day conference with 3 external speakers on DevOps and Cloud Native technologies. We need the main auditorium.', eventDate: '2026-02-10', eventTime: '09:00', venue: 'Main Auditorium (Requested)', requestedBy: 'Zainab Qureshi (SE-2022-005)', status: 'Pending President', currentVersion: 1, feedback: [], history: [] },
                    { id: 'req_p2', title: 'Intro to Git/GitHub Workshop', description: 'A 2-hour workshop for first-year students. We only need a single lab.', eventDate: '2026-01-15', eventTime: '14:00', venue: 'CS Lab 4 (Requested)', requestedBy: 'Ali Hamza (SE-2021-120)', status: 'Pending President', currentVersion: 1, feedback: [], history: [] },
                    { id: 'req_p3', title: 'Career Fair 2025 (V2)', description: 'Revised proposal: Reduced budget to 40,000 PKR by cutting refreshment costs. Focused on 10 core companies.', eventDate: '2026-03-01', eventTime: '10:00', venue: 'Main Lobby (Requested)', requestedBy: 'Student Uzair Shah (SE-2023-100)', status: 'Pending President', currentVersion: 2, feedback: [], history: [] },
                ];
            }
            
            // Data for Graphic Designer review
            if (graphicDesignRequests.length === 0) {
                graphicDesignRequests = [
                    { id: 'gd_req1', eventTitle: 'Annual Code Marathon 2025', status: 'Pending GD Upload', instructions: 'Make it look professional, focus on coding theme.', forwardToPatron: false },
                    { id: 'gd_req2', eventTitle: 'Tech Talk: Future of AI Post', status: 'Pending President Review', instructions: 'Follow the theme from last seminar.', imageUrl: 'https://placehold.co/600x400/9275B7/ffffff?text=Sample+AI+Post', feedback: [], forwardToPatron: false },
                ];
            }
           
            userProfile = {
                phone: '+92 301 9876543',
                address: 'CUST University Staff Lodges, Islamabad',
                picUrl: 'https://placehold.co/100x100/5d3a8e/ffffff?text=AS',
            };
        }


        // --- Initialization and Mock Auth Setup ---

        function initApp() {
            isAuthReady = true;
            loadSampleData(); 
            renderApp('login'); // Start at login screen
        }
        
        // --- Mock Authentication Handlers ---

        // Handle Login
        function handleLogin(e) {
            e.preventDefault();
            const regId = e.target.regId.value;
            
            // Log in as mock President
            userId = 'mock-president-001';
            userName = 'President Adil Saleem'; // Mock user name
            userRegId = regId || 'PRES-001'; // Use entered ID or default
            
            loadSampleData();
            
            showMessage(`Welcome back, ${userName}!`, 'success');
            renderApp('overview'); // Navigate to dashboard
        }
        window.handleLogin = handleLogin;

        function handleLogout() {
            userId = null;
            userName = '';
            userRegId = '';
            userProfile = {};
            presidentEventRequests = []; // Clear user-specific data
            graphicDesignRequests = [];
            
            showMessage("You have been successfully logged out.");
            renderApp('login');
            document.getElementById('ai-chat-window').classList.remove('open');
        }
        window.handleLogout = handleLogout;
        
        async function handlePasswordUpdate(e) {
            e.preventDefault();
            showMessage("Password successfully updated (Demo).", 'success');
            e.target.reset(); 
        }
        window.handlePasswordUpdate = handlePasswordUpdate;

        async function handleProfileUpdate(e) {
            e.preventDefault();
            const form = e.target;
            
            userProfile.phone = form.phone.value;
            userProfile.address = form.address.value;
            userProfile.picUrl = form.picUrl.value;
            
            showMessage("Profile details updated successfully (Demo).", 'success');
            renderApp('profile'); 
        }
        window.handleProfileUpdate = handleProfileUpdate;


        // --- President Specific Logic (Mock) ---

        window.openFeedbackModal = function(eventId, type) {
            document.getElementById('feedback-eventId').value = eventId;
            document.getElementById('feedback-type').value = type; // 'event' or 'graphic'
            
            const modal = document.getElementById('feedback-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.querySelector('.modal-content').classList.remove('scale-95', 'opacity-0');
                modal.querySelector('.modal-content').classList.add('scale-100', 'opacity-100');
            }, 10);
        }
        
        window.closeFeedbackModal = function() {
            const modal = document.getElementById('feedback-modal');
            modal.querySelector('.modal-content').classList.remove('scale-100', 'opacity-100');
            modal.querySelector('.modal-content').classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300); 
        }

        window.handleFeedbackSubmission = function(e) {
            e.preventDefault();
            const form = e.target;
            const eventId = form.eventId.value;
            const type = form.feedbackType.value;
            const message = form.message.value;
            
            if (type === 'event') {
                const eventIndex = presidentEventRequests.findIndex(r => r.id === eventId);
                if (eventIndex > -1) {
                    presidentEventRequests[eventIndex].status = 'Pending Student Review';
                    presidentEventRequests[eventIndex].feedback.push({ role: 'President', message: message });
                    
                    showMessage("Feedback sent to student for revision (Demo).", 'success');
                    renderApp('review-events'); 
                }
            } else if (type === 'graphic') {
                 const graphicIndex = graphicDesignRequests.findIndex(g => g.id === eventId);
                if (graphicIndex > -1) {
                    graphicDesignRequests[graphicIndex].status = 'Pending GD Revision'; // Mock status
                    graphicDesignRequests[graphicIndex].feedback.push({ role: 'President', message: message });
                    
                    showMessage("Feedback sent to Graphic Designer (Demo).", 'success');
                    renderApp('review-graphics');
                }
            }
            
            closeFeedbackModal();
            form.reset();
        }

        // Open Approval Modal
        window.openApproveModal = function(eventId, title) {
            document.getElementById('approve-eventId').value = eventId;
            document.getElementById('approve-event-title').innerText = `Event: ${title}`;

            const modal = document.getElementById('approve-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.querySelector('.modal-content').classList.remove('scale-95', 'opacity-0');
                modal.querySelector('.modal-content').classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        window.closeApproveModal = function() {
             const modal = document.getElementById('approve-modal');
            modal.querySelector('.modal-content').classList.remove('scale-100', 'opacity-100');
            modal.querySelector('.modal-content').classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        // Handle Simple Approval
        window.handleApproveSubmission = function(e) {
            e.preventDefault();
            const form = e.target;
            const eventId = form.eventId.value;
            const comment = form.comment.value || 'Approved by President. Please forward to Patron.';
            
            const eventIndex = presidentEventRequests.findIndex(r => r.id === eventId);
            if (eventIndex > -1) {
                // Update event data - Status set to 'Pending Student Forward'
                presidentEventRequests[eventIndex].status = 'Pending Student Forward'; 
                presidentEventRequests[eventIndex].feedback.push({ role: 'President', message: comment });
                
                showMessage("Event approved! Sent back to Student for review.", 'success');
                renderApp('review-events'); 
            }
            
            closeApproveModal();
            form.reset();
        }

        window.handleCreatePost = function(e) {
            e.preventDefault();
            const form = e.target;
            const newPost = {
                id: 'post_' + Date.now(),
                title: form.title.value,
                description: form.description.value,
                imageUrl: form.imageUrl.value || null,
                author: userName,
                createdAt: new Date().toISOString(),
                isPublished: true,
            };

                    <div class="flex flex-col md:flex-row items-center space-y-4 md:space-y-0 md:space-x-8 mb-6 border-b pb-4">
                        <img src="${userProfile.picUrl || defaultPic}" onerror="this.onerror=null;this.src='${defaultPic}'" alt="Profile Pic" class="w-24 h-24 rounded-full object-cover border-4 border-[#5d3a8e] shadow-xl">
                        <div class="text-center md:text-left">
                            <p class="font-extrabold text-2xl text-[#5d3a8e]">${userName}</p>
                            <p class="font-semibold text-md text-gray-700">Reg ID: ${userRegId}</p>
                            <p class="text-sm text-gray-500">Role: President</p>
                        </div>
                    </div>

                    
                    <h3 class="text-xl font-bold mb-4 text-gray-800 border-b pb-2">Update Profile Details</h3>
                    <form onsubmit="handleProfileUpdate(event)" class="max-w-lg space-y-4">
                        
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2" for="phone">Phone Number</label>
                            <input class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#5d3a8e] focus:border-[#5d3a8e] transition" id="phone" name="phone" type="tel" value="${userProfile.phone || ''}" placeholder="+92 300 xxxxxxx">
                        </div>
                        
                        <div>
                            <label class="block text-gray-700 font-semibold mb-2" for="address">Address</label>
                            <input class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#5d3a8e] focus:border-[#5d3a8e] transition" id="address" name="address" type="text" value="${userProfile.address || ''}" placeholder="H. No. / Street / Town">
                        </div>

                        <div>
                            <label class="block text-gray-700 font-semibold mb-2" for="picUrl">Profile Picture URL</label>
                            <input class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#5d3a8e] focus:border-[#5d3a8e] transition" id="picUrl" name="picUrl" type="url" value="${userProfile.picUrl || ''}" placeholder="https://placehold.co/100x100">
                        </div>

                        <button type="submit" class="btn-primary text-white font-bold py-2 px-4 rounded-lg shadow-md transition duration-150">
                            Save Profile Details
                        </button>
                    </form>
                    
                    <hr class="my-8 border-gray-200">
                    
                    
                    <h3 class="text-xl font-bold mb-4 text-gray-800 border-b pb-2">Change Password</h3>
                    <form onsubmit="handlePasswordUpdate(event)" class="max-w-md">
                        <div class="mb-4">
                            <label class="block text-gray-700 font-semibold mb-2" for="new-password">New Password</label>
                            <input class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-[#5d3a8e] focus:border-[#5d3a8e] transition" id="new-password" name="newPassword" type="password" required minlength="6" placeholder="At least 6 characters">
                        </div>
                        <button type="submit" class="bg-[#9275B7] hover:bg-[#a68bc4] text-white font-bold py-2 px-4 rounded-lg shadow-md transition duration-150">
                            Update Password
                        </button>
                    </form>
                </div>
            `;
        }


        // Initialize the app on window load
        window.onload = initApp;

    </script>
</body>
</html>
