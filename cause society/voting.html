<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote for President - Cause Society CUST</title>
    <!-- Tailwind CSS CDN --><script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f7f7f7; 
        }
        .btn-primary { 
            background-color: #5d3a8e; 
            border: none; 
            transition: background-color 0.2s ease-in-out;
        }
        .btn-primary:hover { 
            background-color: #4a2f72; 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Top Navigation Bar (Themed Purple) -->
    <nav class="bg-[#5d3a8e] p-4 flex items-center justify-between shadow-lg z-10">
        <div class="flex items-center">
            <img src="https://play-lh.googleusercontent.com/8QQUZDWOC8RpSqVsw2apjdnLiHvyLc1vJBpOC0MNQcE3_-JHv3XtW1K5m6YmVA6I-A" alt="CUST Logo" class="h-10 w-10 mr-3 rounded-full bg-white p-1">
            <span class="text-white text-xl font-extrabold">CAUSE Society</span>
            <span class="text-white text-sm ml-2 hidden md:inline opacity-80">Presidential Election</span>
        </div>
        
        <div class="flex items-center space-x-4">
            <span class="text-white text-md font-semibold hidden sm:inline">Student Uzair Shah (SE-2023-100)</span>
            <button class="bg-gray-400 text-white font-semibold py-1 px-3 rounded-lg text-sm transition duration-150 cursor-not-allowed" disabled>Logout</button>
        </div>
    </nav>

    <!-- Main Content Area (Full Screen Lockdown) -->
    <main class="flex-1 p-4 md:p-8 bg-gray-50 flex items-center justify-center">
        
        <div id="message-box" class="fixed top-20 right-5 z-50 transition-transform duration-500 transform translate-x-full"></div>

        <div id="voting-content" class="w-full">
            <!-- Content renderVoteScreen() or renderThankYou() will be rendered here -->
        </div>
    </main>

    <!-- Modal for Candidate Profile View -->
    <div id="profile-modal" class="hidden fixed inset-0 bg-black bg-opacity-75 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-3xl max-h-[90vh] overflow-y-auto transform transition-all duration-300 scale-95 opacity-0">
            <div class="sticky top-0 bg-[#5d3a8e] p-4 flex justify-between items-center rounded-t-xl z-10">
                <h3 class="text-2xl font-bold text-white">Candidate Profile</h3>
                <button onclick="closeProfileModal()" class="text-white hover:text-gray-200 text-3xl font-bold">&times;</button>
            </div>
            <div id="profile-content" class="p-8">
                <!-- Profile content will be rendered here -->
            </div>
        </div>
    </div>

    
    <script>
        // --- Mock Data States ---
        let hasUserVoted = false; 
        let presidentialCandidates = [
            { 
                id: 'cand_1', 
                name: 'Zainab Qureshi', 
                regId: 'SE-2022-005', 
                slogan: 'For a vibrant and inclusive society.',
                picUrl: 'https://placehold.co/100x100/9275B7/ffffff?text=ZQ',
                vision: 'My goal is to digitalize all society processes and host one major inter-university event. I want to create a transparent system where every student can track event progress and participate actively in decision-making.',
                experience: 'Served as Event Coordinator for 2 years. Successfully organized 5 major events including the Annual Tech Conference 2024.',
                portfolio: 'https://github.com/zainabqureshi',
                vp_name: 'Ahmed Khan (SE-2022-010)'
            },
            { 
                id: 'cand_2', 
                name: 'Ali Hamza', 
                regId: 'SE-2021-120', 
                slogan: 'Bridging the gap between students and faculty.',
                picUrl: 'https://placehold.co/100x100/5d3a8e/ffffff?text=AH',
                vision: 'I aim to establish regular feedback sessions between students and faculty, create mentorship programs, and ensure every student voice is heard in society decisions.',
                experience: 'Former General Secretary. Led the society through 3 successful semesters with 100% event approval rate.',
                portfolio: 'https://github.com/alihamza',
                vp_name: 'Sara Ahmed (SE-2021-085)'
            },
            { 
                id: 'cand_3', 
                name: 'Iqra Sohail', 
                regId: 'SE-2022-090', 
                slogan: 'Dedicated resources for every event.',
                picUrl: 'https://placehold.co/100x100/4a2f72/ffffff?text=IS',
                vision: 'Focus on securing better funding and resources for society events. Build partnerships with tech companies for sponsorships and internship opportunities for members.',
                experience: 'Treasurer for 1 year. Managed budget of PKR 500,000+ with zero discrepancies. Secured 3 corporate sponsorships.',
                portfolio: 'https://linkedin.com/in/iqrasohail',
                vp_name: 'Bilal Tariq (SE-2022-045)'
            },
        ];

        // --- Utility Function ---
        function showMessage(message, type = 'success', duration = 4000) {
            const box = document.getElementById('message-box');
            if (!box) return;
            const bgColor = type === 'error' ? 'bg-red-500' : type === 'warning' ? 'bg-yellow-500' : 'bg-green-500';
            const html = `
                <div class="${bgColor} text-white p-4 rounded-xl shadow-2xl mb-3 flex items-center">
                    <span class="flex-grow">${message}</span>
                    <button onclick="this.parentNode.remove()" class="ml-4 font-bold">&times;</button>
                </div>
            `;
            box.insertAdjacentHTML('afterbegin', html);
            box.classList.remove('translate-x-full');
            box.classList.add('translate-x-0');

            setTimeout(() => {
                const elementToRemove = box.lastElementChild;
                if (elementToRemove) elementToRemove.remove();
                if (box.children.length === 0) {
                    box.classList.remove('translate-x-0');
                    box.classList.add('translate-x-full');
                }
            }, duration);
        }

        // --- Profile Modal Functions ---
        function openProfileModal(candidateId) {
            const candidate = presidentialCandidates.find(c => c.id === candidateId);
            if (!candidate) return showMessage("Candidate not found.", 'error');

            const profileContent = document.getElementById('profile-content');
            profileContent.innerHTML = `
                <div class="space-y-6">
                    <!-- Header with Photo -->
                    <div class="flex items-center space-x-6 border-b pb-6">
                        <img src="${candidate.picUrl}" alt="${candidate.name}" class="w-24 h-24 rounded-full border-4 border-[#5d3a8e] shadow-lg">
                        <div>
                            <h4 class="text-2xl font-extrabold text-[#5d3a8e]">${candidate.name}</h4>
                            <p class="text-gray-600 font-semibold">${candidate.regId}</p>
                            <p class="text-gray-700 italic mt-2">"${candidate.slogan}"</p>
                        </div>
                    </div>

                    <!-- Vision & Goals -->
                    <div class="border-b pb-6">
                        <h5 class="text-lg font-bold text-gray-800 mb-3 flex items-center">
                            <svg class="w-5 h-5 mr-2 text-[#5d3a8e]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Vision & Goals (Manifesto)
                        </h5>
                        <p class="text-gray-700 leading-relaxed bg-gray-50 p-4 rounded-lg">${candidate.vision}</p>
                    </div>

                    <!-- Experience -->
                    <div class="border-b pb-6">
                        <h5 class="text-lg font-bold text-gray-800 mb-3 flex items-center">
                            <svg class="w-5 h-5 mr-2 text-[#5d3a8e]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                            Past Society Experience / Achievements
                        </h5>
                        <p class="text-gray-700 leading-relaxed bg-gray-50 p-4 rounded-lg">${candidate.experience}</p>
                    </div>

                    <!-- Additional Resources -->
                    <div class="border-b pb-6">
                        <h5 class="text-lg font-bold text-gray-800 mb-3 flex items-center">
                            <svg class="w-5 h-5 mr-2 text-[#5d3a8e]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                            Additional Resources & Team
                        </h5>
                        <div class="space-y-3 bg-gray-50 p-4 rounded-lg">
                            <p class="text-gray-700"><span class="font-semibold">Portfolio/GitHub:</span> 
                                <a href="${candidate.portfolio}" target="_blank" class="text-blue-600 hover:underline">${candidate.portfolio}</a>
                            </p>
                            <p class="text-gray-700"><span class="font-semibold">Proposed Vice President:</span> ${candidate.vp_name}</p>
                        </div>
                    </div>

                    <!-- Action Button -->
                    <div class="flex justify-center pt-4">
                        <button onclick="closeProfileModal(); handleVoteSubmission('${candidate.id}', '${candidate.name}')" 
                                class="bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg transition duration-150">
                            Vote for ${candidate.name}
                        </button>
                    </div>
                </div>
            `;

            const modal = document.getElementById('profile-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.querySelector('.bg-white').classList.remove('scale-95', 'opacity-0');
                modal.querySelector('.bg-white').classList.add('scale-100', 'opacity-100');
            }, 10);
        }
        window.openProfileModal = openProfileModal;

        function closeProfileModal() {
            const modal = document.getElementById('profile-modal');
            modal.querySelector('.bg-white').classList.remove('scale-100', 'opacity-100');
            modal.querySelector('.bg-white').classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }
        window.closeProfileModal = closeProfileModal;

        // --- Main Voting Logic ---
        function handleVoteSubmission(candidateId, candidateName) {
            if (hasUserVoted) return showMessage("You have already voted.", 'warning');

            // 1. Set vote status (Mock)
            hasUserVoted = true; 
            
            // 2. Show success message
            showMessage(`You have voted for ${candidateName}! Your dashboard is now unlocking.`, 'success', 6000);
            
            // 3. Re-render screen to show "Thank You"
            renderVoteScreen();
        }
        window.handleVoteSubmission = handleVoteSubmission;

        function renderVoteScreen() {
            const container = document.getElementById('voting-content');
            
            if (hasUserVoted) {
                // Screen 2: Thank you message
                container.innerHTML = `
                    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-2xl mx-auto border-t-8 border-green-600">
                        <h2 class="text-3xl font-bold mb-6 text-green-700">Vote Submitted!</h2>
                        <div class="p-4 bg-green-50 border border-green-300 rounded-lg mb-6 shadow-lg">
                            <p class="font-semibold text-green-800 flex items-center">
                                <svg class="w-6 h-6 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
                                Thank you! Your vote has been recorded.
                            </p>
                        </div>
                        <p class="text-gray-600 mt-4">You can now access your dashboard. (This page would auto-redirect... in this demo, you must refresh or click a link).</p>
                        <!-- In real app, this would be a redirect -->
                    </div>
                `;
            } else {
                // Screen 1: Voting Lockdown
                const candidatesHtml = presidentialCandidates.map(candidate => `
                    <div class="p-4 border border-gray-200 rounded-xl shadow-sm bg-white transition-all duration-300 hover:shadow-lg mb-4">
                        <div class="flex justify-between items-center">
                            <div class="flex items-center space-x-3">
                                <img src="${candidate.picUrl}" alt="${candidate.name}" class="w-12 h-12 rounded-full border-2 border-[#5d3a8e] shadow-md">
                                <div>
                                    <h4 class="text-lg font-bold text-gray-800">${candidate.name}</h4>
                                    <p class="text-sm text-gray-500">${candidate.regId}</p>
                                    <p class="text-xs italic text-gray-600 mt-1">"${candidate.slogan}"</p>
                                </div>
                            </div>
                            <div class="flex flex-col space-y-2">
                                <button onclick="openProfileModal('${candidate.id}')" 
                                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg transition duration-150 shadow-md text-sm">
                                    View Profile
                                </button>
                                <button onclick="handleVoteSubmission('${candidate.id}', '${candidate.name}')" 
                                        class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg transition duration-150 shadow-md text-sm">
                                    Cast Vote
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');

                container.innerHTML = `
                    <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-2xl mx-auto border-t-8 border-red-600">
                        <h2 class="text-3xl font-bold mb-6 text-red-600">Presidential Election - VOTE NOW!</h2>
                        <div class="p-4 bg-red-50 border border-red-300 rounded-lg mb-6 shadow-lg">
                            <p class="font-semibold text-red-800 flex items-center">
                                <svg class="w-5 h-5 mr-2" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>
                                ELECTION LOCKDOWN: You cannot access your dashboard until you cast your vote.
                            </p>
                        </div>
                        
                        <h3 class="text-xl font-bold mb-4 text-gray-800">Select Your Candidate:</h3>
                        <div class="space-y-4">
                            ${candidatesHtml}
                        </div>
                    </div>
                `;
            }
        }

        // Initialize the app on window load
        window.onload = renderVoteScreen;

    </script>
</body>
</html>
